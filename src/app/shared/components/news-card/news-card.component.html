<article class="news-card" role="article">
  <div class="news-image">
    @if (news().imageUrl) {
      <img [ngSrc]="news().imageUrl!" [alt]="news().title" width="400" height="300" loading="lazy" />
    } @else {
      <div class="news-image-placeholder">
        <svg viewBox="0 0 40 40" width="40" height="40">
          <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M20 4 L24 16 L36 16 L26 24 L30 36 L20 28 L10 36 L14 24 L4 16 L16 16 Z" fill="currentColor" opacity="0.6"/>
        </svg>
      </div>
    }
    <div class="news-category-badge" [class]="'cat-' + news().category">
      {{ news().category }}
    </div>
  </div>
  <div class="news-body">
    <time class="news-date">{{ (news().publishedAt || news().createdAt) | date:'dd/MM/yyyy' }}</time>
    <h3 class="news-title">{{ news().title }}</h3>
    <p class="news-excerpt">{{ news().excerpt }}</p>
    <a [routerLink]="['/noticia', news().slug]" class="news-read-more" aria-label="Leer más: {{ news().title }}">
      Leer más
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</article>
