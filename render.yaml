# render.yaml — raíz del monorepo cb-tomelloso
services:
  # ─── BACKEND NestJS ───────────────────────────────────────────────
  - type: web
    name: cb-tomelloso-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api/v1
      - key: DB_HOST
        value: mysql-9465549-robercalero2004-69ea.i.aivencloud.com
      - key: DB_PORT
        value: "16883"
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_NAME
        value: cbtomelloso
      - key: DB_SSL
        value: REQUIRED
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://cb-tomelloso-web.onrender.com,https://cb-tomelloso.onrender.com,http://localhost:4200
      - key: FRONTEND_URL
        value: https://cb-tomelloso.onrender.com
      - key: THROTTLE_TTL
        value: "60000"
      - key: THROTTLE_LIMIT
        value: "60"
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_USER_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        value: noreply@cbtomelloso.es
      - key: ADMIN_EMAIL
        value: admin@cbtomelloso.es

  # ─── FRONTEND Angular (SSR) ───────────────────────────────────────
  - type: web
    name: cb-tomelloso-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: node dist/cb-tomelloso-web/server/server.mjs
    envVars:
      - key: NODE_VERSION
        value: "22"

